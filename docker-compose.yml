version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agentmatch_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentmatch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: agentmatch_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
