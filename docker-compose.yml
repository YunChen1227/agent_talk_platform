version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: agentmatch_db
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: agentmatch
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: agentmatch_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  redis:
    image: redis:7
    container_name: agentmatch_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
  es_data:
